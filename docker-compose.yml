version: '3.8'

services:

  # PostgreSQL database
  postgres:
    image: postgres:15-alpine
    container_name: cloudops_postgres
    environment:
      POSTGRES_DB: cloudops
      POSTGRES_USER: cloudops_user
      POSTGRES_PASSWORD: cloudops_local_password
    ports:
      - "5432:5432"
    volumes:
      # Persist database data between container restarts
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloudops_user -d cloudops"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Node.js backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cloudops_backend
    env_file:
      - ./backend/.env
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
    command: >
      sh -c "npm install nodemon --save-dev &&
             npx nodemon src/index.js"

  # React frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cloudops_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data: